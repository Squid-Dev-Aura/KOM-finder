<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KOM Explorer | Find Nearby Strava KOMs</title>
    <meta name="description" content="Discover nearby Strava segments and King of the Mountain (KOM) leaderboards on an interactive map.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="logo">
                <span class="logo-k">K</span> EXPLORER
            </div>
            <div class="nav-links">
                <a href="#" class="active">Map</a>
                <a href="#">Segments</a>
                <a href="#">Leaderboards</a>
            </div>
            <div class="auth-section">
                <button id="strava-connect" class="btn-strava">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Strava_Logo.svg" alt="Strava" class="strava-icon">
                    CONNECT WITH STRAVA
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <aside class="sidebar">
                <div class="search-container">
                    <input type="text" id="segment-search" placeholder="Search segments, locations...">
                </div>
                <div class="segments-list-container">
                    <h2>Explore Segments</h2>
                    <ul id="segments-list" class="segments-list">
                        <!-- Segments will be injected here -->
                        <div class="loader-container">
                            <p>Connect to Strava to see segments near you</p>
                        </div>
                    </ul>
                </div>
            </aside>

            <div id="map-container">
                <div id="map"></div>
                <div class="map-controls">
                    <button id="locate-me" title="Locate Me">⌖</button>
                </div>
            </div>
        </main>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js"></script>
</body>
</html>
